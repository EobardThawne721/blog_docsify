  <div id="app">

  <script>
    function switchTheme(name) {
      // 1. 获取全部主题link
      const links = {
        vue: document.getElementById('theme-vue'),
        buble: document.getElementById('theme-buble'),
        dark: document.getElementById('theme-dark')
      };
      // 2. 仅把当前激活的主题设为正常媒体，其余全部隐藏
      Object.keys(links).forEach(key => {
        if (key === name) {
          links[key].media = 'all'; // 启用当前选中主题
        } else {
          links[key].media = 'none'; // 其余样式静默失效，不清除页面全部样式
        }
      });
      // 持久化存储
      localStorage.setItem('docsify-theme', name);
    }

    // 页面加载完成自动恢复上次主题
    document.addEventListener('DOMContentLoaded', () => {
      const last = localStorage.getItem('docsify-theme') || 'vue';
      switchTheme(last);
    });

    // 脚注配置信息
    function refreshFooterYear() {
      const footerEl = document.querySelector('footer.className');
      if (!footerEl) return;
      // 动态获取当前年份
      const currentYear = new Date().getFullYear();
      footerEl.innerHTML = footerEl.innerHTML.replace('YEAR', currentYear);
    }
    document.addEventListener('DOMContentLoaded', refreshFooterYear);
    window.addEventListener('hashchange', () => {
      setTimeout(refreshFooterYear, 80);
    });

    window.$docsify = {
      name: '✍️个人笔记',       // 左上角标题
      // logo: '/_media/icon.svg', // 左上角标题对应的logo
      repo: 'https://github.com/EobardThawne721/blog_docsify',                 // 右上角github跳转链接
      // homepage: '/home.md',  //主页文档
      search: {                   //左上角的搜索框
        paths: "auto",           //搜索全部
        placeholder: '🔍搜索...', //搜索框提示文字
        noData: '暂无结果',       //找不到结果的提示文字
        hideOtherSidebarContent: true,  //搜索时隐藏侧边目录
      },
      copyCode: {                   //复制代码功能
        buttonText: '点击复制',
        errorText: '复制失败',
        successText: '复制成功',
      },
      loadNavbar: true,         //开启导航栏    _navbar.md
      loadSidebar: true,        // 开启侧边栏   _sidebar.md
      subMaxLevel: 3,           // 侧边栏自动展开几级标题
      maxLevel: 6,              //允许解析全部 6 级标题，生成锚点链接
      sidebarDisplayLevel: 0,   //默认自动展开的层级深度：https://github.com/iPeng6/docsify-sidebar-collapse
      toc: {                    // 右侧目录
        tocMaxLevel: 0,        // 右侧最多展示4级标题 
        target: 'h0',    // 只提取二、三、四级标题，忽略#一级大标题
      },
      coverpage: false,          //配置自定义封面 _coverpage.md
      onlyCover: false,          //配置封面和首页是否同时出现
      mergeNavbar: true,         //在较小的屏幕上，导航栏将与侧边栏合并
      autoHeader: false,          //添加每个文档的标题页面
      count: true,               //显示当前的字数
      timeUpdater: {            //全局配置最后一次修改日期
        whereToPlace: "bottom", // top=顶部 / bottom=底部
        text: `<div style="position:fixed;right:20px;bottom:20px;color:#666;font-size:13px;background:#fff;padding:6px 10px;border-radius:6px;box-shadow:0 1px 4px #ddd;">{docsify-updated}</div>`,
        formatUpdated: function (time) {    //格式化显示最后一次修改的日期
          const dt = new Date(time);
          const fmt = new Intl.DateTimeFormat('zh-CN', {
            timeZone: 'Asia/Shanghai',
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: false
          }).format(dt);
          return `📅最后更新日期：${fmt}`;
        },
      },
      footer: {                             //脚注配置:https://github.com/erickjx/docsify-footer-enh
        copy: '<span>&copy; 2026</span>',   //copy信息
        auth: 'by Eobard Thawne',           //作者信息
        pre: '<hr/>',                       //pre footer
        style: 'text-align: center;',       //Footer CSS inline style
        class: 'className',                 //Footer Classes to include
      },
      progress: {                   // 阅读进度条配置:https://github.com/HerbertHe/docsify-progress
        position: "bottom",           //进度条展示的位置
        color: "var(--theme-color,#42b983)",//进度条颜色 
        height: "3px",                      //进度条高度
      },
      breadcrumb: {      //每页顶部添加路径信息：https://github.com/FranCarstens/docsify-breadcrumb
        showHome: false,     //在主页时显示主页链接
        homeText: 'Home', //主页链接的文本。
        separator: ' &rsaquo; ',    //每个面包屑物品之间的分隔符>
        casing: 'capitalize',
        linkColor: 'var(--theme-color, #42b983)', //面包屑链接的颜色。这可以是任何有效的 CSS 颜色值
        size: '2em'
      },
      hideCode: {        //代码折叠：https://github.com/jl15988/docsify-hide-code
        scroll: true, // Enable scrolling
        height: 300 // Max height
      },




      slider: {
        // Default options
        auto: false,
        intervalTime: 20000,
        hideToolbar: true,
      },



      dashboard: {   // https://github.com/erectbranch/docsify-dashboard
        numTabContent: 3,
        metadataUrl: 'test',       // do not include '.json' extension
        sort: false,                         // sort the posts by time
        theme: 'list',                    // (1) default, (2) cards, (3) list
        tagboardTheme: 'default',            // options are same as above
        categoryTheme: {},
        pagination: false                    // enable pagination for the dashboard
      },
      plugins: [
        function pageFooter(hook, vm) {
          var footer = [
            '<!-- tag-list -->',
          ].join('');
          hook.afterEach(function (html) {
            return html + footer;
          });
        },
      ],

      tabs: {
        persist: true, // default
        sync: true, // default
        theme: 'classic', // default
        tabComments: true, // default
        tabHeadings: true // default
      },


      vueGlobalOptions: {
        data() {
          return {}
        }
      },

    }

  </script>
